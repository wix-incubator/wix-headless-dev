name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Wix login
        run: npx wix login --api-key "$WIX_CLI_TOKEN"
        env:
          WIX_CLI_TOKEN: ${{ secrets.WIX_CLI_TOKEN }}

      - name: Create preview deployment
        id: preview
        run: |
          set -o pipefail
          npx wix preview 2>&1 | tee preview.log
          url="$(grep -Eoi 'https?://[^[:space:]]+' preview.log | tail -n1)"
          if [ -z "$url" ]; then
            echo "Could not parse a preview URL from wix preview output." >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: wix-preview
          message: |
            **Preview deployment ready** for commit `${{ github.event.pull_request.head.sha }}`

            ${{ steps.preview.outputs.url }}
